<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code of Abs Plus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #222; padding: 24px 16px; }

    header { max-width: 700px; margin: 0 auto 20px; }
    header h1 { font-size: 22px; margin-bottom: 4px; }
    header p { font-size: 13px; color: #666; }
    header a { color: #1a73e8; }

    .acoes { max-width: 700px; margin: 0 auto 18px; display: flex; gap: 8px; }
    .acoes button {
      font-size: 12px; padding: 6px 12px;
      border: 1px solid #ccc; border-radius: 6px;
      background: white; cursor: pointer; color: #444;
    }
    .acoes button:hover { background: #f0f0f0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
      max-width: 700px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 14px 8px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .card:hover { border-color: #aaa; }
    

    .card .numero { font-size: 28px; font-weight: bold; color: #bbb; line-height: 1; margin-bottom: 6px; }
    .card .label { font-size: 13px; font-weight: bold; color: #333; }
    
    .card .check { font-size: 18px; margin-top: 4px; height: 24px; }
  </style>
</head>
<body>

<header>
  <h1>💪 Code of Abs Plus</h1>
  <p>BA3148424 → último dígito: <strong>4</strong> → Quarta-Feira &nbsp;·&nbsp;
     <a href="https://darebee.com/programs/code-of-abs-plus.html" target="_blank">ver programa</a></p>
</header>

<div class="acoes">
  <button onclick="marcarTodos()">✅ Marcar todos</button>
  <button onclick="desmarcarTodos()">🗑️ Limpar tudo</button>
</div>

<div class="grid" id="grid"></div>

<script>
  const feitos = JSON.parse(localStorage.getItem("coap_feitos") || "{}");

  function salvar() { localStorage.setItem("coap_feitos", JSON.stringify(feitos)); }

  function criarCard(i) {
    const div = document.createElement("div");
    div.className = "card" + (feitos[i] ? " feito" : "");
    div.innerHTML = `
      <div class="numero">${i}</div>
      <div class="label">Dia ${i}</div>
      <div class="check">${feitos[i] ? "✅" : ""}</div>
    `;
    div.onclick = () => {
      feitos[i] = !feitos[i];
      salvar();
      div.className = "card" + (feitos[i] ? " feito" : "");
      div.querySelector(".check").textContent = feitos[i] ? "✅" : "";
    };
    return div;
  }

  function renderizar() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    for (let i = 1; i <= 30; i++) grid.appendChild(criarCard(i));
  }

  function marcarTodos() {
    for (let i = 1; i <= 30; i++) feitos[i] = true;
    salvar(); renderizar();
  }

  function desmarcarTodos() {
    if (confirm("Desmarcar tudo?")) {
      for (let i = 1; i <= 30; i++) feitos[i] = false;
      salvar(); renderizar();
    }
  }

  renderizar();
</script>
</body>
</html>
